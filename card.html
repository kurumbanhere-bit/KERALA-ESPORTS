<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Details - KL ESPORTS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
    :root { --p-green: #0fa958; --bg-light: #f5fff9; --white: #ffffff; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; --text-dark: #1a1a1a; --red: #ff4d4d; }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-light); color: #333; padding-bottom: 90px; }
    
    .header { background: var(--white); padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 5px rgba(0,0,0,0.05); }
    .header i { font-size: 20px; color: var(--p-green); margin-right: 15px; cursor: pointer; }
    .header span { font-size: 18px; font-weight: bold; }

    .match-preview { background: var(--white); margin: 15px; padding: 20px; border-radius: 15px; border: 1px solid #eee; }
    .m-title { font-size: 18px; font-weight: 800; text-transform: uppercase; }
    .m-prize-main { font-size: 22px; font-weight: 900; color: var(--p-green); margin-top: 4px; }
    .m-date { font-size: 11px; font-weight: 800; color: var(--red); margin-top: 8px; text-transform: uppercase; display: inline-block; background: #fff5f5; padding: 4px 8px; border-radius: 5px; }

    .room-card-white { background: var(--white); margin: 0 15px 15px 15px; padding: 18px; border-radius: 15px; border: 2px solid var(--p-green); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .room-title-label { font-size: 11px; color: #555; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .room-grid { display: flex; justify-content: space-between; gap: 10px; }
    .room-item-box { flex: 1; background: #f9f9f9; padding: 12px; border-radius: 10px; border: 1px solid #f0f0f0; text-align: center; }
    .room-label-small { font-size: 9px; color: #999; text-transform: uppercase; font-weight: bold; margin-bottom: 4px; }
    .room-value-text { font-size: 14px; font-weight: 800; color: #222; font-family: monospace; }
    .room-locked-text { font-size: 11px; font-weight: 800; color: var(--red); grid-column: span 2; text-align: center; padding: 5px; }

    .tabs { display: flex; background: #f0f0f0; margin: 15px; border-radius: 12px; padding: 4px; }
    .tab { flex: 1; text-align: center; padding: 10px; font-size: 13px; font-weight: 700; color: #777; cursor: pointer; border-radius: 10px; }
    .tab.active { background: white; color: var(--p-green); }

    /* Player Card Styles */
    .player-card { background: white; margin: 0 15px 10px 15px; padding: 12px; border-radius: 12px; border: 1px solid #eee; }
    .p-main-info { display: flex; align-items: center; gap: 12px; }
    .player-img { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; background: #f0f0f0; }
    .p-user-name { font-weight: 800; font-size: 14px; color: #222; }
    .squad-tag { font-size: 9px; font-weight: 900; background: #f1f5f9; padding: 2px 6px; border-radius: 4px; color: #64748b; margin-left: auto; }
    .squad-members-box { margin-top: 10px; padding-top: 8px; border-top: 1px dashed #eee; display: flex; flex-wrap: wrap; gap: 6px; }
    .member-chip { font-size: 11px; font-weight: 700; color: #555; background: #f8fafc; padding: 4px 10px; border-radius: 20px; border: 1px solid #e2e8f0; }

    .rule-item { display: flex; gap: 12px; margin-bottom: 15px; align-items: flex-start; }
    .rule-num { min-width: 24px; height: 24px; background: var(--p-green); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
    .rule-text { font-size: 12.5px; color: #444; line-height: 1.5; }

    .footer { position: fixed; bottom: 0; width: 100%; background: var(--white); padding: 15px 20px; box-sizing: border-box; border-top: 1px solid #eee; }
    .btn-join { background: var(--p-green); color: var(--white); width: 100%; border: none; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
    <i class="fa-solid fa-arrow-left" onclick="history.back()"></i>
    <span id="headerTitle">JOINED 0/48</span>
</div>

<div class="match-preview">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
            <div class="m-title" id="mTitle">Loading...</div>
            <div class="m-prize-main" id="mPrizeHeader">₹0</div>
            <div id="mDate" class="m-date">...</div>
        </div>
        <img src="" id="mThumb" style="width:75px; height:75px; border-radius:12px; object-fit: cover;">
    </div>
</div>

<div class="room-card-white" id="roomInfoBox">
    <div class="room-title-label"><i class="fa-solid fa-door-open" style="color:var(--p-green)"></i> Room Details</div>
    <div class="room-grid" id="roomDetailsContent"></div>
</div>

<div id="activeMatchUI">
    <div class="tabs">
        <div class="tab active" onclick="showTab('prize')">Prize Pool</div>
        <div class="tab" onclick="showTab('players')">Players</div>
        <div class="tab" onclick="showTab('rules')">Rules</div>
    </div>
    <div id="prizeSection"><div id="prizeList" style="background:white; margin:0 15px; border-radius:12px; border:1px solid #eee;"></div></div>
    <div id="playerSection" style="display:none;"><div id="playerList"></div></div>
    <div id="rulesSection" style="display:none; padding: 20px; background: white; margin: 0 15px; border-radius: 12px; border: 1px solid #eee;">
        <div id="dynamicRules"></div>
    </div>
    <div class="footer" id="joinFooter"><button class="btn-join" id="joinBtn" onclick="handleJoin()">JOIN NOW</button></div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBrHcONT6y0he3fzrtRGqdQMZfIMpGxcNo",
    authDomain: "kl-esports.firebaseapp.com",
    databaseURL: "https://kl-esports-default-rtdb.firebaseio.com",
    projectId: "kl-esports",
    storageBucket: "kl-esports.appspot.com",
    messagingSenderId: "440301376580",
    appId: "1:440301376580:web:fb0b8ae0df3fe096bd1811"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
const matchId = new URLSearchParams(window.location.search).get('id');

const defaultIcon = 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
let currentUid = "";
let userGameName = "";
let currentBalance = 0;
let entryFee = 0;
let matchCategory = "";

auth.onAuthStateChanged(user => {
    if(user) {
        currentUid = user.uid;
        db.ref("users/" + user.uid).on('value', snap => {
            const data = snap.val();
            if(data) {
                userGameName = data.gameName || data.username || "Player";
                let walletData = data.wallet;
                if (walletData && typeof walletData === 'object') {
                    currentBalance = parseInt(walletData.deposit || 0) + parseInt(walletData.winnings || 0);
                } else { currentBalance = parseInt(walletData || 0); }
            }
        });
    } else { window.location.href = "login.html"; }
});

function loadPlayers() {
    const listDiv = document.getElementById('playerList');
    listDiv.innerHTML = "<div style='text-align:center; padding:20px;'>Loading Players...</div>";
    db.ref('matches/' + matchId + '/participants').on('value', snapshot => {
        listDiv.innerHTML = "";
        if(!snapshot.exists()) { listDiv.innerHTML = "<div style='text-align:center; padding:40px;'>No players yet.</div>"; return; }
        snapshot.forEach(child => {
            const part = child.val();
            const playerName = part.playerName || part.gameName || "Unknown Player";
            const isTeam = (part.teamType === "SQUAD" || part.teamType === "DUO");
            
            let html = `<div class="player-card"><div class="p-main-info"><img src="${defaultIcon}" class="player-img"><div class="p-user-name">${playerName}</div><div class="squad-tag">${part.teamType || 'SOLO'}</div></div>`;
            if(isTeam && part.teamInfo && part.teamInfo.members) {
                html += `<div class="squad-members-box">`;
                part.teamInfo.members.forEach((member, index) => {
                    if(index === 0) return;
                    html += `<span class="member-chip">${member}</span>`;
                });
                html += `</div>`;
            }
            html += `</div>`;
            listDiv.innerHTML += html;
        });
    });
}

function renderRules(cat) {
    const rulesDiv = document.getElementById('dynamicRules');
    const isCS = cat.toUpperCase().includes("CLASH") || cat.toUpperCase().includes("CS");
    
    if(isCS) {
        rulesDiv.innerHTML = `
            <div class="rule-item"><div class="rule-num">1</div><div class="rule-text">Tournment rule.</div></div>
            <div class="rule-item"><div class="rule-num">2</div><div class="rule-text">Multiple accounts = Permanent Freeze.</div></div>
            <div class="rule-item"><div class="rule-num">3</div><div class="rule-text">Zone pack : Strictly NOT allowed.</div></div>
            <div class="rule-item"><div class="rule-num">4</div><div class="rule-text">Throwables (Grenades/Flash): Not allowed.</div></div>
            <div class="rule-item"><div class="rule-num">5</div><div class="rule-text">Only mobile players allowed (No Emulators).</div></div>
            <div class="rule-item"><div class="rule-num">6</div><div class="rule-text">Minimum level required: 40.</div></div>
            <div class="rule-item"><div class="rule-num">7</div><div class="rule-text">Character skills & Gun attributes: OFF.</div></div>
            <div class="rule-item"><div class="rule-num">8</div><div class="rule-text">POV Recording: Mandatory for every player.</div></div>
            <div class="rule-item"><div class="rule-num">9</div><div class="rule-text"> Room ID and Password will be provided at the exact time. The match starts 10 minutes later. If the opponent is absent even after 10 minutes, you get the winnings and they get no refund.
Example: For a 5:00 PM match, ID/Pass is given at 5:00, and start is at 5:10.</div></div>
            <div class="rule-item"><div class="rule-num">10</div><div class="rule-text">If you face any problem, support or issues contact on customer support.</div></div>
            <div class="rule-item"><div class="rule-num">11</div><div class="rule-text">Share your POV first to request opponent's.</div></div>
            <div class="rule-item"><div class="rule-num">12</div><div class="rule-text">Once POV is requested, it must be provided within 24 hours. Otherwise, no winnings will be given.</div></div>
            <div class="rule-item"><div class="rule-num">13</div><div class="rule-text">Missed room join: No refund.</div></div>
            <div class="rule-item"><div class="rule-num">14</div><div class="rule-text">Unregistered invites: Kicked immediately.</div></div>
            <div class="rule-item"><div class="rule-num">15</div><div class="rule-text">Hacks/Glitch/Unfair use: Permanent ban.</div></div>
            <div class="rule-item"><div class="rule-num">16</div><div class="rule-text">Result: Declared within 1 hour.</div></div>
        `;
    } else {
        rulesDiv.innerHTML = `
            <div style="font-weight:900; color:var(--p-green); font-size:11px; margin-bottom:12px; text-transform:uppercase;">BR Tournament Rules</div>
            <div class="rule-item"><div class="rule-num">1</div><div class="rule-text">BR Survival with Per Kill points system.</div></div>
            <div class="rule-item"><div class="rule-num">2</div><div class="rule-text">No Teaming: Disqualification if caught.</div></div>
            <div class="rule-item"><div class="rule-num">3</div><div class="rule-text">Mobile only. No emulators/panels.</div></div>
            <div class="rule-item"><div class="rule-num">4</div><div class="rule-text">Minimum level 40 required to join.</div></div>
            <div class="rule-item"><div class="rule-num">5</div><div class="rule-text">Unregistered invites = Kick without refund.</div></div>
            <div class="rule-item"><div class="rule-num">6</div><div class="rule-text">POV recording mandatory from room entry.</div></div>
            <div class="rule-item"><div class="rule-num">7</div><div class="rule-text">Provide POV within 3 hours if requested.</div></div>
            <div class="rule-item"><div class="rule-num">8</div><div class="rule-text">No refund for missed join or kick.</div></div>
            <div class="rule-item"><div class="rule-num">9</div><div class="rule-text">Hacks/Cheats: Permanent ban & wallet freeze.</div></div>
            <div class="rule-item"><div class="rule-num">10</div><div class="rule-text">Results declared within 1 hour.</div></div>
            <div class="rule-item"><div class="rule-num">11</div><div class="rule-text">Plain text names only. No stylish fonts.</div></div>
            <div class="rule-item"><div class="rule-num">12</div><div class="rule-text">Stay in joined slot. No switching.</div></div>
            <div class="rule-item"><div class="rule-num">13</div><div class="rule-text">ID & Pass shared 5 mins before start.</div></div>
            <div class="rule-item"><div class="rule-num">14</div><div class="rule-text">If duo or squad match. only entire with squad entry. </div></div>
        `;
    }
}

if(matchId) {
    db.ref('matches/' + matchId).on('value', snap => {
        const data = snap.val(); if(!data) return;
        matchCategory = data.category || "Tournament";
        document.getElementById('mTitle').innerText = matchCategory;
        document.getElementById('mPrizeHeader').innerText = "₹" + (data.prize || 0);
        document.getElementById('mThumb').src = data.thumbnail || "";
        
        const participants = data.participants || {};
        const isJoined = participants[currentUid] ? true : false;
        
        const roomContent = document.getElementById('roomDetailsContent');
        roomContent.innerHTML = isJoined ? 
            `<div class="room-item-box"><div class="room-label-small">Room ID</div><div class="room-value-text">${data.roomId || "Pending"}</div></div><div class="room-item-box" style="margin-left:10px;"><div class="room-label-small">Password</div><div class="room-value-text">${data.roomPass || "Pending"}</div></div>` : 
            `<div class="room-locked-text"><i class="fa-solid fa-lock"></i> JOIN TO UNLOCK ROOM</div>`;

        entryFee = parseInt(data.entry || 0);
        const joinedCount = Object.keys(participants).length;
        const maxSlots = parseInt(data.max || 48);
        document.getElementById('headerTitle').innerText = `JOINED ${joinedCount}/${maxSlots}`;

        const jBtn = document.getElementById('joinBtn');
        if(isJoined) { jBtn.innerText = "JOINED"; jBtn.disabled = true; jBtn.style.background = "#888"; }
        else { jBtn.innerText = "JOIN NOW - ₹" + entryFee; jBtn.disabled = false; }
    });
}

function handleJoin() {
    if(currentBalance < entryFee) { alert("Insufficient Balance!"); return; }
    if(!confirm("Join for ₹" + entryFee + "?")) return;
    db.ref(`matches/${matchId}/participants/${currentUid}`).set({ uid: currentUid, playerName: userGameName, joinedAt: Date.now() }).then(() => {
        db.ref(`matches/${matchId}/joined`).transaction(c => (c || 0) + 1);
        alert("Successfully Joined! 🔥");
    });
}

function showTab(type) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.currentTarget.classList.add('active');
    document.getElementById('prizeSection').style.display = type === 'prize' ? 'block' : 'none';
    document.getElementById('playerSection').style.display = type === 'players' ? 'block' : 'none';
    document.getElementById('rulesSection').style.display = type === 'rules' ? 'block' : 'none';
    if(type === 'players') loadPlayers();
    if(type === 'rules') renderRules(matchCategory);
}
</script>
</body>
</html>
