<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Add Cash - KL ESPORTS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="add-money.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<div class="header">
    <i class="fa-solid fa-arrow-left" onclick="history.back()"></i>
    <b>Add Cash</b>
</div>

<div class="container">
    <div class="card">
        <div id="amountSection">
            <span class="label">Enter Amount</span>
            <div class="input-area">
                <span>₹</span>
                <input type="number" id="amtInput" value="100" placeholder="0">
            </div>
        </div>

        <div id="qrDisplay" style="display: none;">
            <p class="qr-note"><i class="fa-solid fa-qrcode"></i> Scan or Screenshot to Pay</p>
            <div class="qr-square-frame">
                <img id="myQr" src="qr.png" class="qr-image" alt="UPI QR">
            </div>
            <div class="upi-id-box">UPI: 8891611790@fam</div>
        </div>

        <div class="instruction-box">
            <div class="step"><div class="step-num">1</div><span>Take Screenshot of QR and pay via any UPI app.</span></div>
            <div class="step"><div class="step-num">2</div><span>Copy 12-Digit UTR from payment history.</span></div>
            <div class="step"><div class="step-num">3</div><span>Paste UTR below and click Verify.</span></div>
        </div>

        <div id="utrSection" style="display: none;">
            <span class="label">Paste UTR Number</span>
            <input type="text" id="utrInput" class="utr-field" placeholder="12 Digit Ref No." maxlength="12">
        </div>
    </div>
</div>

<div class="footer">
    <button class="add-btn" id="mainBtn" onclick="showQR()">SHOW QR CODE</button>
</div>

<script src="add-money.js"></script>
</body>
</html>
