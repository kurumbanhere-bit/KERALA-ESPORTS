<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KERALA ESPORTS</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        /* 🔥 Flicker thadayaan aadyam hide cheyyunnu */
        #loginContainer, #copyrightSection {
            display: none;
        }

        /* 🎨 PREMIUM RED & BLACK SPLASH STYLES (MATCHING DASHBOARD) */
        #userSplash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #ff0000 0%, #800000 60%, #000000 100%);
            z-index: 10001;
            display: flex; /* Initial state */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }

        #userSplash img {
            width: 80%;
            max-width: 350px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(0, 0, 0, 0.7));
            animation: pulseEffect 2.5s infinite ease-in-out;
            margin-bottom: 40px;
        }

        @keyframes pulseEffect {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .loader-wrapper {
            width: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .k-progress-container {
            width: 100%;
            height: 4px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }

        .k-progress-bar {
            width: 0%;
            height: 100%;
            background: #000;
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
            animation: fastLoad 3s forwards ease-in-out;
        }

        @keyframes fastLoad {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .loading-text {
            color: #000;
            font-family: sans-serif;
            font-size: 10px;
            letter-spacing: 4px;
            margin-top: 15px;
            text-transform: uppercase;
            font-weight: 800;
            opacity: 0.8;
        }
    </style>

    <script>
        // ⚡ Fast Redirect if Cache exists
        if (localStorage.getItem("userProfile")) {
            window.location.href = "dashboard.html";
        }
    </script>
</head>
<body>

<!-- 🎮 1. RED & BLACK SPLASH SCREEN -->
<div id="userSplash">
    <img src="LOGOO.png" alt="KL ESPORTS">
    <div class="loader-wrapper">
        <div class="k-progress-container">
            <div class="k-progress-bar"></div>
        </div>
        <p class="loading-text">Joining Arena...</p>
    </div>
</div>

<!-- ⚡ Old loader hidden as we use the new Splash -->
<div id="loader" style="display:none;"></div>

<div class="container" id="loginContainer">
    <h1>Welcome to</h1>
    <h2>KERALA ESPORTS</h2>
    
    <div class="input-box">
        <input type="email" id="email" placeholder="Email Address">
    </div>
    
    <div class="input-box" style="margin-bottom: 5px;">
        <input type="password" id="password" placeholder="Password">
        <span class="show-pass" onclick="toggleLoginPass()">SHOW</span>
    </div>
    
    <div class="forgot-outer" onclick="openReset()">Forgot Password?</div>

    <div class="legal-box" style="display: flex; align-items: flex-start; gap: 10px; margin: 20px 0; text-align: left; padding: 0 10px;">
        <input type="checkbox" id="ageCheck" style="width: 20px; height: 20px; accent-color: #0fa958; cursor: pointer; margin-top: 2px;">
        <label for="ageCheck" style="font-size: 11px; color: #777; line-height: 1.5; cursor: pointer;">
            I am 18+ years old and I agree to the 
            <a href="terms.html" style="color: #0fa958; font-weight: bold; text-decoration: none;">Terms & Conditions</a> 
            and <a href="privacy-policy.html" style="color: #0fa958; font-weight: bold; text-decoration: none;">Privacy Policy</a>.
        </label>
    </div>

    <button class="btn-login" id="loginBtn" onclick="login()" style="opacity: 0.5; cursor: not-allowed;" disabled>LOGIN</button>
    
    <div id="error" style="color: #ff4d4d; font-size: 12px; margin-top: 10px; font-weight: bold;"></div>
    
    <div class="signup">Don't have an account? <span onclick="goSignup()" style="color: #0fa958; font-weight: bold; cursor: pointer;">Sign Up</span></div>
</div>

<div class="copyright" id="copyrightSection" style="text-align: center; width: 100%; padding: 190px 0; margin-top: 20px;">
    <p style="font-size: 11px; color: #888; margin: 0;">&copy; 2026 <b>KERALA ESPORTS</b>. All Rights Reserved.</p>
    <p style="font-size: 11px; color: #888; margin: 5px 0 0;">Developed by <span style="color: #0fa958; font-weight: bold;">JOSH.M.LYJU</span></p>
</div>

<script src="index.js"></script>

<script>
    // 🔥 SPLASH CONTROLLER
    (function() {
        const splash = document.getElementById('userSplash');
        setTimeout(() => {
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                // Only show login if not logged in
                firebase.auth().onAuthStateChanged(user => {
                    if (user) {
                        window.location.href = "dashboard.html";
                    } else {
                        document.getElementById("loginContainer").style.display = "block";
                        document.getElementById("copyrightSection").style.display = "block";
                    }
                });
            }, 800);
        }, 3000); // 3 Seconds Stay
    })();

    function goSignup() {
        window.location.href = "signup.html";
    }

    const ageCheck = document.getElementById('ageCheck');
    const loginBtn = document.getElementById('loginBtn');

    if(ageCheck) {
        ageCheck.addEventListener('change', function() {
            if(this.checked) {
                loginBtn.disabled = false;
                loginBtn.style.opacity = "1";
                loginBtn.style.cursor = "pointer";
            } else {
                loginBtn.disabled = true;
                loginBtn.style.opacity = "0.5";
                loginBtn.style.cursor = "not-allowed";
            }
        });
    }

    function toggleLoginPass() {
        var x = document.getElementById("password");
        x.type = (x.type === "password") ? "text" : "password";
    }
</script>

</body>
</html>
