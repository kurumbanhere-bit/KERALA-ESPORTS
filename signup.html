<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KERALA ESPORTS - Signup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="signup.css">
</head>

<body>

<div id="loader">
    <div class="spinner"></div>
</div>

<div class="container">
    <h1>Create Account</h1>

    <div class="input-box">
        <input type="text" id="fname" placeholder="First Name">
    </div>
    
    <div class="input-box">
        <input type="text" id="lname" placeholder="Last Name">
    </div>
    
    <div class="input-box">
        <input type="text" id="username" placeholder="Username">
    </div>
    
    <div class="input-box">
        <input type="email" id="email" placeholder="Email (Gmail only)">
    </div>
    
    <div class="input-box">
        <input type="password" id="pass" placeholder="Password">
        <span class="show-pass" onclick="togglePass()">SHOW</span>
    </div>

    <button class="btn" id="signupBtn" onclick="signup()">SIGN UP</button>
    
    <div id="msg"></div>

    <div class="login-link">
        Already have an account? <span onclick="location.href='index.html'">Login</span>
    </div>
</div>

<div class="popup" id="otpPopup">
    <div class="popup-box">
        <div class="back-btn" onclick="closeOTP()">
            <i class="fa-solid fa-arrow-left"></i>
        </div>
        
        <h3>Verify Email</h3>
        <p>We've sent a 6-digit code to your Gmail.</p>
        
        <input type="number" id="otpInput" placeholder="Enter OTP">
        
        <button class="btn" id="verifyBtn" onclick="verifyOTP()">VERIFY & REGISTER</button>
        
        <div class="resend" onclick="resendOTP()">Resend OTP</div>
        <div id="otpMsg"></div>
    </div>
</div>

<script src="signup.js"></script>

</body>
</html>
