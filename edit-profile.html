<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Settings - KERALA ESPORTS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="edit-profile.css">
</head>
<body>

<div class="top-bar">
    <i class="fa-solid fa-arrow-left" onclick="history.back()"></i>
    Account Settings
</div>

<div class="profile-section">
    <div class="img-container">
        <img id="profilePreview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile-img">
        <label for="imgUpload" class="camera-icon"><i class="fa-solid fa-camera"></i></label>
        <input type="file" id="imgUpload" accept="image/*" style="display: none;" onchange="previewImage(event)">
    </div>
    <div id="uName" class="display-name">Gamer</div>
</div>

<div class="form-container">
    <div class="input-group">
        <label>Game Name (FF Name)</label>
        <input type="text" id="gameName" placeholder="Enter your FF name">
    </div>
    <div class="input-group">
        <label>Game UID</label>
        <input type="number" id="gameID" placeholder="Enter your UID">
    </div>
    <button id="saveBtn" class="save-btn" onclick="saveData()">SAVE CHANGES</button>
    
    <div id="loader" class="loader-container">
        <div class="spinner"></div>
        <p style="font-size: 12px; color: #888; margin-top: 5px;">Updating profile...</p>
    </div>
</div>

<div class="logout-footer" onclick="logoutUser()">
    <i class="fa-solid fa-right-from-bracket"></i> LOGOUT FROM ACCOUNT
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="edit-profile.js"></script>
</body>
</html>
