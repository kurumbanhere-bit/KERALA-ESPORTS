<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Statistics - KERALA ESPORTS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="match-history.css">
</head>
<body>

<div class="header">
    <i class="fa-solid fa-arrow-left" onclick="window.history.back()"></i>
    <span>My Statistics</span>
</div>

<div class="table-header">
    <span class="col-id">#</span>
    <span class="col-info">Match Info</span>
    <span class="col-paid">Paid</span>
    <span class="col-won">Won</span>
</div>

<div id="match-list" class="match-container">
    <div class="loading-text">Loading matches...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="match-history.js"></script>
</body>
</html>
