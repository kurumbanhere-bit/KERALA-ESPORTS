<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KL ESPORTS - Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        /* 🎨 PREMIUM RED & BLACK SPLASH STYLES */
        #userSplash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #ff0000 0%, #800000 60%, #000000 100%);
            z-index: 10001; /* Dashboard-inu mukalil nilkkan */
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }

        #userSplash img {
            width: 80%;
            max-width: 350px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(0, 0, 0, 0.7));
            animation: pulseEffect 2.5s infinite ease-in-out;
            margin-bottom: 40px;
        }

        @keyframes pulseEffect {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .loader-wrapper {
            width: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .k-progress-container {
            width: 100%;
            height: 4px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }

        .k-progress-bar {
            width: 0%;
            height: 100%;
            background: #000;
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
            animation: fastLoad 3s forwards ease-in-out;
        }

        @keyframes fastLoad {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .loading-text {
            color: #000;
            font-family: sans-serif;
            font-size: 10px;
            letter-spacing: 4px;
            margin-top: 15px;
            text-transform: uppercase;
            font-weight: 800;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<!-- 🎮 1. RED & BLACK SPLASH SCREEN -->
<div id="userSplash">
    <img src="LOGOO.png" alt="KL ESPORTS">
    <div class="loader-wrapper">
        <div class="k-progress-container">
            <div class="k-progress-bar"></div>
        </div>
        <p class="loading-text">Loading Arena...</p>
    </div>
</div>

<!-- ⚡ 2. SPLASH LOGIC -->
<script>
    (function() {
        const splash = document.getElementById('userSplash');
        // Session storage check
        if (!sessionStorage.getItem('dashboardSplashShown')) {
            splash.style.display = 'flex';
            setTimeout(() => {
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    sessionStorage.setItem('dashboardSplashShown', 'true');
                }, 800);
            }, 6000); // 5 Seconds Stay
        } else {
            splash.style.display = 'none';
        }
    })();
</script>

<div id="loader"><div class="spinner"></div></div>

<div class="header">
    <div class="header-left">
        <img id="profilePic" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" loading="eager" onclick="location.href='profile.html'">
        <span id="usernameDisplay">Loading...</span>
    </div>
    <div class="wallet-box" id="walletAmount">₹0</div>
</div>

<div class="categories">
    <div class="category active" onclick="filterMatches(this, 'BR PER KILL')">BR PER KILL</div>
    <div class="category" onclick="filterMatches(this, 'BR SURVIVAL')">BR SURVIVAL</div>
    <div class="category" onclick="filterMatches(this, 'CS HEADSHOT')">CS HEADSHOT</div>
    <div class="category" onclick="filterMatches(this, 'CLASH SQUAD')">CLASH SQUAD</div>
    <div class="category" onclick="filterMatches(this, 'LONE WOLF')">LONE WOLF</div>
    <div class="category" onclick="filterMatches(this, 'LW HEADSHOT')">LW HEADSHOT</div>
    <div class="category" onclick="filterMatches(this, 'LOSE TO WIN')">LOSE TO WIN</div>
    <div class="category" onclick="filterMatches(this, 'SUNDAY SPECIAL')">SUNDAY SPECIAL</div>
</div>

<div id="matchContainer" class="matches-container"></div>

<div class="bottom-nav">
    <div class="active"><i class="fa-solid fa-house"></i>Home</div>
    <div onclick="location.href='my-matches.html'"><i class="fa-solid fa-gamepad"></i>My Matches</div>
    <div onclick="location.href='task.html'"><i class="fa-solid fa-tasks"></i>Tasks</div>
    <div onclick="location.href='wallet.html'"><i class="fa-solid fa-wallet"></i>Wallet</div>
    <div onclick="location.href='profile.html'"><i class="fa-solid fa-user"></i>Profile</div>
</div>

<script src="dashboard.js" defer></script>
</body>
</html>
