<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Matches - KL ESPORTS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- CSS File Name Corrected to Small Letters -->
    <link rel="stylesheet" href="my-matches.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<!-- Loader Screen -->
<div id="loader"><div class="spinner"></div></div>

<!-- Top Navigation Bar -->
<div class="top-bar">
    <i class="fa-solid fa-arrow-left" onclick="location.href='dashboard.html'"></i>
    <span>MY MATCHES</span>
</div>

<!-- Tab Selection Area -->
<div class="tab-navigator">
    <div class="tab active" onclick="switchTab(this, 'upcoming')">Upcoming</div>
    <div class="tab" onclick="switchTab(this, 'ongoing')">Ongoing</div>
    <div class="tab" onclick="switchTab(this, 'completed')">Completed</div>
</div>

<!-- Matches Content Area -->
<div id="matchContent" class="matches-container">
    <!-- Matches will be injected here by JS -->
    <div style="text-align:center; padding:50px; color:#888;">Loading Matches...</div>
</div>

<!-- JS File Name Corrected to Small Letters -->
<script src="my-matches.js"></script>

</body>
</html>
