<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - KL ESPORTS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #222; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(255, 77, 0, 0.1); }
        .logo { width: 80px; margin-bottom: 20px; }
        h2 { color: #ff4d00; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #ff4d00; }
        .btn-login { width: 100%; padding: 15px; background: #ff4d00; color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-login:active { transform: scale(0.98); }
        .error { color: #ff4444; font-size: 12px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="logo.png" alt="Logo" class="logo">
    <h2>Admin Login</h2>
    <input type="email" id="email" placeholder="Admin Email">
    <input type="password" id="password" placeholder="Password">
    <button class="btn-login" onclick="login()">Access Dashboard</button>
    <p id="errorMessage" class="error">Invalid Admin Credentials!</p>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBrHcONT6y0he3fzrtRGqdQMZfIMpGxcNo",
        authDomain: "kl-esports.firebaseapp.com",
        databaseURL: "https://kl-esports-default-rtdb.firebaseio.com",
        projectId: "kl-esports",
        storageBucket: "kl-esports.appspot.com",
        messagingSenderId: "440301376580",
        appId: "1:440301376580:web:fb0b8ae0df3fe096bd1811"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Login Function
    function login() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMessage');

        // Admin email check (Ninte email aanu enn urappu varuthunnu)
        if (email !== "kurumbanhere@gmail.com") {
            errorMsg.innerText = "Access Denied: Not an Admin!";
            errorMsg.style.display = "block";
            return;
        }

        auth.signInWithEmailAndPassword(email, pass)
            .then((userCredential) => {
                // Success - Dashboard-ilekku vidunnu
                window.location.href = "dashboard.html";
            })
            .catch((error) => {
                errorMsg.innerText = "Error: " + error.message;
                errorMsg.style.display = "block";
            });
    }

    // Oru thavan login aayal pinne login page kaanikkaruth
    auth.onAuthStateChanged(user => {
        if (user && user.email === "kurumbanhere@gmail.com") {
            window.location.href = "dashboard.html";
        }
    });
</script>

</body>
</html>
