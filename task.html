<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task - Claim Reward</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            visibility: hidden; /* Auth check kazhiyunnath vare hide cheyyan */
            opacity: 0;
            transition: opacity 0.5s;
        }
        .task-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }
        h2 { color: #333; }
        .reward-val {
            font-size: 24px;
            color: #27ae60;
            font-weight: bold;
            margin: 10px 0;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        #message {
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="task-card">
    <h2>Daily Task</h2>
    <p>Sign Up Reward</p>
    <div class="reward-val">10 Coins</div>
    <button id="claim-btn" onclick="claimReward()">Claim</button>
    <p id="message"></p>
    <br>
    <button onclick="window.location.href='dashboard.html'" style="background: #95a5a6; font-size: 12px;">Back</button>
</div>

<script>
    // 1. Firebase Configuration (Nee thanna athe config)
    const firebaseConfig = {
        apiKey: "AIzaSyAo9KNsWnq2AgoCGzPuCsg7YCbuw8-Apuo",
        authDomain: "studio-4988500581-b9772.firebaseapp.com",
        databaseURL: "https://studio-4988500581-b9772-default-rtdb.firebaseio.com",
        projectId: "studio-4988500581-b9772",
        storageBucket: "studio-4988500581-b9772.firebasestorage.app",
        messagingSenderId: "773461302160",
        appId: "1:773461302160:web:13deb67b24b267ac0b7115"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 2. Auth Check & UI Reveal
    firebase.auth().onAuthStateChanged(user => {
        if (user) {
            document.body.style.visibility = "visible";
            document.body.style.opacity = "1";
            checkPreviousClaim(user.uid);
        } else {
            window.location.replace("index.html");
        }
    });

    // 3. Ithu mumb claim cheythittundo ennu check cheyyunnu
    function checkPreviousClaim(uid) {
        const dbRef = database.ref('rewards/' + uid);
        dbRef.once('value', (snapshot) => {
            if (snapshot.exists()) {
                updateUIAlreadyClaimed();
            }
        });
    }
function claimReward() {
    const user = firebase.auth().currentUser;
    const btn = document.getElementById("claim-btn");
    const msg = document.getElementById("message");

    if (!user) return;

    const rewardRef = database.ref('rewards/' + user.uid);
    const walletRef = database.ref('users/' + user.uid + '/wallet');

    // 1. Adyam reward mumb eduthittundo ennu check cheyyunnu
    rewardRef.once('value', (snapshot) => {
        if (snapshot.exists()) {
            updateUIAlreadyClaimed();
        } else {
            // 2. Wallet-ile winnings update cheyyunnu
            walletRef.once('value', (walletSnapshot) => {
                let data = walletSnapshot.val();
                let currentWin = 0;

                // Ninte wallet structure anusarich winnings edukkunnu
                if (data && data.winnings) {
                    currentWin = Number(data.winnings);
                }

                // Puthiya balance (Pazhayath + 10)
                let newWin = currentWin + 10;

                // Wallet-il update cheyyunnu, koode rewards section-il mark cheyyunnu
                const updates = {};
                updates['users/' + user.uid + '/wallet/winnings'] = newWin;
                updates['rewards/' + user.uid] = {
                    rewardClaimed: true,
                    amount: 10,
                    date: new Date().toISOString()
                };

                // Database-ilekku push cheyyunnu
                database.ref().update(updates).then(() => {
                    alert("Congrats! ₹10 ninte Winnings-ilekku add cheythu.");
                    updateUIAlreadyClaimed();
                }).catch((error) => {
                    msg.style.color = "red";
                    msg.innerText = "Error: " + error.message;
                });
            });
        }
    });
}


    function updateUIAlreadyClaimed() {
        const btn = document.getElementById("claim-btn");
        const msg = document.getElementById("message");
        btn.disabled = true;
        btn.innerText = "Claimed";
        msg.style.color = "#27ae60";
        msg.innerText = "You have already collected this reward!";
    }
</script>

</body>
</html>
