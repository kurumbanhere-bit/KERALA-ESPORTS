<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KL ESPORTS - Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
:root { --p-green: #0fa958; --bg-light: #f5fff9; --text-dark: #222; }
body{ margin:0; font-family:'Segoe UI', sans-serif; background: var(--bg-light); padding-bottom: 80px; overflow-x: hidden; }

/* Loader Fix */
#loader { position: fixed; inset: 0; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 10000; }
.spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--p-green); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { 100% { transform: rotate(360deg); } }

.header{ display:flex; justify-content:space-between; align-items:center; padding:15px 20px; background:white; box-shadow:0 2px 5px rgba(0,0,0,0.05); position: sticky; top:0; z-index:100; }
.header-left{ display:flex; align-items:center; gap:12px; }
.header-left img{ width:42px; height:42px; border-radius:50%; border:2px solid var(--p-green); object-fit:cover; background: #eee; cursor: pointer; }
.header-left span{ font-weight:bold; font-size:15px; color:#333; }
.wallet-box{ font-weight:bold; color:var(--p-green); background:#e8f5e9; padding:6px 15px; border-radius:20px; font-size: 14px; }

.categories{ display:flex; overflow-x:auto; padding:12px 10px; gap:10px; background:white; scrollbar-width: none; border-bottom: 1px solid #f0f0f0; }
.category{ flex:0 0 auto; padding:8px 18px; border-radius:20px; background:#f5f5f5; color:#777; font-weight:bold; font-size:11px; cursor:pointer; border: 1px solid #eee; transition: 0.2s; }
.category.active{ background:var(--p-green); color:white; border-color:var(--p-green); }

.matches-container { padding: 15px; }
.match-card { background: #fff; border-radius: 15px; margin-bottom: 15px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); position: relative; border: 1px solid #f0f0f0; cursor: pointer; }
.card-top { display: flex; gap: 6px; margin-bottom: 12px; }
.tag { font-size: 9px; padding: 3px 10px; background: #f9f9f9; border: 1px solid #eee; border-radius: 6px; color: #888; font-weight: 700; text-transform: uppercase; }

.match-thumb { width: 75px; height: 75px; border-radius: 12px; object-fit: cover; background: #f0f0f0; }
.m-title { font-size: 14px; font-weight: 800; color: #333; }
.prize-txt { color: var(--p-green); font-size: 13px; font-weight: bold; margin-top: 15px; }
.m-date { font-size: 10px; font-weight: bold; color: #ff4d4d; margin-top: 6px; }

.bar-bg { width: 50%; height: 6px; background: #f0f0f0; border-radius: 10px; margin-top: 10px; }
.bar-fill { height: 100%; background: var(--p-green); border-radius: 10px; }

.join-btn-dashboard { position: absolute; bottom: 0; right: 0; background: var(--p-green); color: #fff; padding: 12px 35px; border-radius: 25px 0 0 0; font-weight: 800; font-size: 12px; clip-path: polygon(15% 0, 100% 0, 100% 100%, 0% 100%); border: none; cursor: pointer; }

.bottom-nav{ display:flex; justify-content:space-around; align-items:center; position:fixed; bottom:0; width:100%; background:white; padding:10px 0; border-top: 1px solid #eee; z-index: 100; }
.bottom-nav div{ display:flex; flex-direction:column; align-items:center; color:#bbb; font-size:10px; font-weight: bold; gap:5px; cursor: pointer; }
.bottom-nav .active{ color:var(--p-green); }

/* Reward Popup */
#rewardPopup { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
.reward-card { background: white; padding: 30px; border-radius: 25px; width: 80%; max-width: 320px; text-align: center; }
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<div id="rewardPopup">
    <div class="reward-card">
        <div style="font-size:60px;">🎁</div>
        <h2 style="margin:10px 0;">WELCOME BONUS!</h2>
        <div style="font-size:35px; font-weight:900; color:var(--p-green);">₹10</div>
        <button class="claim-btn" id="claimBtn" onclick="claimReward()" style="width: 100%; padding: 15px; background: var(--p-green); color: white; border: none; border-radius: 12px; font-weight: bold; margin-top: 20px;">CLAIM NOW</button>
    </div>
</div>

<div class="header">
 <div class="header-left">
   <img id="profilePic" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" onclick="location.href='profile.html'">
   <span id="usernameDisplay">Loading Profile...</span>
 </div>
 <div class="wallet-box" id="walletAmount">₹0</div>
</div>

<div class="categories" id="categoryBar">
 <div class="category active" onclick="filterMatches(this, 'BR PER KILL')">BR PER KILL</div>
 <div class="category" onclick="filterMatches(this, 'BR SURVIVAL')">BR SURVIVAL</div>
 <div class="category" onclick="filterMatches(this, 'CS HEADSHOT')">CS HEADSHOT</div>
</div>

<div id="matchContainer" class="matches-container"></div>

<div class="bottom-nav">
 <div class="active"><i class="fa-solid fa-house"></i>Home</div>
 <div onclick="location.href='my-matches.html'"><i class="fa-solid fa-gamepad"></i>My Matches</div>
 <div onclick="location.href='wallet.html'"><i class="fa-solid fa-wallet"></i>Wallet</div>
 <div onclick="location.href='profile.html'"><i class="fa-solid fa-user"></i>Profile</div>
</div>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyBrHcONT6y0he3fzrtRGqdQMZfIMpGxcNo",
 authDomain: "kl-esports.firebaseapp.com",
 databaseURL: "https://kl-esports-default-rtdb.firebaseio.com",
 projectId: "kl-esports",
 storageBucket: "kl-esports.appspot.com",
 messagingSenderId: "440301376580",
 appId: "1:440301376580:web:fb0b8ae0df3fe096bd1811"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentCategory = "BR PER KILL";
let allMatches = [];

// ⚡ FAST AUTH & PROFILE LOAD
auth.onAuthStateChanged(user => {
    if(user){
        // Fetch Profile ONCE for speed
        db.ref("users/" + user.uid).once('value', snapshot => {
            const userData = snapshot.val();
            if(userData) {
                document.getElementById("usernameDisplay").innerText = userData.username || "Gamer";
                let total = userData.wallet ? (parseInt(userData.wallet.deposit || 0) + parseInt(userData.wallet.winnings || 0)) : 0;
                document.getElementById("walletAmount").innerText = "₹" + total;
                if(userData.profilePic) document.getElementById("profilePic").src = userData.profilePic;
                if(userData.bonusClaimed !== true) setTimeout(() => document.getElementById('rewardPopup').style.display = 'flex', 1500);
            }
            document.getElementById("loader").style.display = "none";
        });
        loadMatchesFast();
    } else { window.location.href = "login.html"; }
});

// ⚡ FAST MATCH FETCHING
function loadMatchesFast() {
    // limitToLast(25) upayogichu, puthiya matches mathram load aakum
    db.ref('matches').limitToLast(25).on('value', snapshot => {
        allMatches = [];
        snapshot.forEach(child => {
            let data = child.val();
            data.key = child.key;
            allMatches.push(data);
        });
        allMatches.sort((a, b) => new Date(a.time) - new Date(b.time));
        renderUI();
    });
}

function renderUI() {
    const container = document.getElementById('matchContainer');
    const user = auth.currentUser;
    const now = Date.now();
    let html = "";

    allMatches.forEach(data => {
        if(data.category === currentCategory) {
            const mTime = new Date(data.time).getTime();
            if(mTime <= now) return;
            if(data.participants && user && data.participants[user.uid]) return;

            const joined = parseInt(data.joined) || 0;
            const max = parseInt(data.max) || 48;
            const progress = (joined / max) * 100;

            html += `
                <div class="match-card" onclick="if(!event.target.classList.contains('join-btn-dashboard')) location.href='card.html?id=${data.key}'">
                    <div class="card-top">
                        <span class="tag">${data.teamType}</span>
                        <span class="tag">${data.map || 'BERMUDA'}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between;">
                        <div>
                            <div class="m-title">FREE FIRE - ${data.category}</div>
                            <div class="prize-txt">Prize: ₹${data.prize}</div>
                            <div class="m-date">${data.time}</div>
                        </div>
                        <img src="${data.thumbnail}" class="match-thumb" loading="lazy">
                    </div>
                    <div class="bar-bg"><div class="bar-fill" style="width:${progress}%"></div></div>
                    <div style="font-size:11px; margin-top:5px; font-weight:bold;">${max - joined} Slots left</div>
                    <button class="join-btn-dashboard">₹${data.entry} JOIN</button>
                </div>
            `;
        }
    });
    container.innerHTML = html || "<div style='text-align:center; padding:50px;'>No Matches found.</div>";
}

function filterMatches(el, cat) {
    document.querySelectorAll('.category').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    currentCategory = cat;
    renderUI();
}

function claimReward() {
    const user = auth.currentUser;
    const btn = document.getElementById('claimBtn');
    btn.disabled = true;
    db.ref('users/' + user.uid).transaction(curr => {
        if(curr && curr.bonusClaimed !== true) {
            let bal = curr.wallet || { deposit: 0, winnings: 0 };
            bal.deposit = (parseInt(bal.deposit) || 0) + 10;
            curr.wallet = bal;
            curr.bonusClaimed = true;
            return curr;
        }
    }, (err, commit) => {
        if(commit) { 
            alert("Bonus Claimed!");
            document.getElementById('rewardPopup').style.display = 'none';
        }
    });
}
</script>
</body>
</html>
