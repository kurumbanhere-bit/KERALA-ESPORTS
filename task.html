<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tasks - KERALA ESPORTS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --p-green: #27ae60;
            --bg: #f4f4f4;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .top-bar {
            width: 100%;
            background: #fff;
            padding: 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        .top-bar i { font-size: 20px; margin-right: 15px; cursor: pointer; }
        
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            flex-direction: column;
            color: #777;
        }
        .coming-soon-icon {
            font-size: 50px;
            color: var(--p-green);
            margin-bottom: 15px;
        }
        .coming-soon-text {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <i class="fa-solid fa-arrow-left" onclick="history.back()"></i>
    <span>TASKS</span>
</div>

<div class="main-content">
    <i class="fa-solid fa-clock-rotate-left coming-soon-icon"></i>
    <div class="coming-soon-text">Coming Soon</div>
    <p>New tasks will be available shortly!</p>
</div>

</body>
</html>
