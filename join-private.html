<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coming Soon - KL ESPORTS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --p-red: #ff0000; --dark-bg: #000000; }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--dark-bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* 🐉 Dragon Icons */
        .dragon-box {
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 60px;
            color: var(--p-red);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px #ff0000);
        }

        .fa-dragon {
            animation: breathe 2s infinite alternate ease-in-out;
        }

        h1 {
            font-size: 40px;
            font-weight: 900;
            margin: 0;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
            text-transform: uppercase;
        }

        p {
            color: #ccc;
            font-size: 14px;
            margin-top: 10px;
            letter-spacing: 2px;
            font-weight: bold;
        }

        /* 🔥 Fire Button */
        .btn-home {
            margin-top: 30px;
            background: linear-gradient(45deg, #990000, #ff0000);
            color: white;
            text-decoration: none;
            padding: 12px 35px;
            border-radius: 5px;
            font-weight: 800;
            font-size: 13px;
            display: inline-block;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            transition: 0.3s;
            border: none;
        }

        .btn-home:active {
            transform: scale(0.9);
            box-shadow: 0 0 5px #ff0000;
        }

        /* ⚡ Animations */
        @keyframes breathe {
            from { transform: scale(1) translateY(0); opacity: 0.7; }
            to { transform: scale(1.1) translateY(-10px); opacity: 1; }
        }

        /* Dark Smoke Effect Background */
        .smoke-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(60,0,0,1) 0%, rgba(0,0,0,1) 100%);
            z-index: 1;
            opacity: 0.8;
        }

        .fire-glow {
            position: absolute;
            bottom: -50px;
            width: 100%;
            height: 200px;
            background: var(--p-red);
            filter: blur(100px);
            opacity: 0.2;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div class="smoke-bg"></div>
    <div class="fire-glow"></div>

    <div class="container">
        <div class="dragon-box">
            <i class="fa-solid fa-dragon"></i>
            <i class="fa-solid fa-fire-flame-curved"></i>
            <i class="fa-solid fa-dragon fa-flip-horizontal"></i>
        </div>
        <h1>COMING SOON</h1>
        <p>AWAKENING THE DRAGON...</p>
        <br>
        <a href="index.html" class="btn-home">BACK TO HOME</a>
    </div>

</body>
</html>
