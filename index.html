<html lang="en">
<head>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --primary: #0fa958;
    --bg: #ffffff;
    --surface: #f4f7f5;
    --text-main: #333333;
    --text-dim: #888888;
}

body { margin:0; font-family:'Segoe UI', sans-serif; background: var(--bg); color: var(--text-main); overflow-x: hidden; }

/* 💎 SIMPLE HD SPLASH SCREEN */
#loader {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #ffffff; display: flex; flex-direction: column; 
    justify-content: center; align-items: center; z-index: 10001;
    transition: opacity 0.8s ease;
}
.hd-logo { 
    width: 160px; height: auto; 
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.08));
    animation: simpleFade 1.2s ease-in-out;
}
@keyframes simpleFade { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
.spinner { margin-top: 25px; width: 30px; height: 30px; border: 3.5px solid #f3f3f3; border-top: 3.5px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* PAGE CONTENT */
.container { max-width:400px; margin:auto; padding:60px 25px; text-align: center; display: none; }
h1 { color: var(--text-main); font-weight: 800; margin-bottom: 5px; font-size: 28px; }
h2 { color: var(--primary); margin-top: 0; font-size: 24px; font-weight: 900; margin-bottom: 40px; }
.input-box { background: var(--surface); padding:16px 20px; border-radius:15px; margin-bottom:18px; position:relative; border: 1px solid #eee; }
.input-box input { border:none; background:none; width:100%; font-size:16px; outline:none; color: var(--text-main); }
.show-pass { position:absolute; right:20px; top:50%; transform:translateY(-50%); cursor:pointer; color: var(--primary); font-weight:bold; font-size:11px; }
.btn-login { width:100%; padding:16px; border:none; border-radius:15px; background: var(--primary); color:white; font-size:16px; font-weight:bold; cursor:pointer; }
#error { text-align:center; margin-top:15px; font-size: 13px; font-weight: 600; min-height: 40px; line-height: 1.5; }
.forgot { text-align:right; color: var(--text-dim); font-size:13px; cursor:pointer; margin-bottom:20px; }
.signup { text-align:center; margin-top:40px; color: var(--text-dim); font-size: 14px; }
.signup span { color: var(--primary); font-weight:bold; cursor:pointer; }
.policy-overlay { position:fixed; inset:0; background:rgba(255, 255, 255, 0.98); z-index:10000; display:none; justify-content:center; align-items:center; }
.policy-box { background: #ffffff; width:85%; max-width:320px; padding:35px 25px; border-radius:30px; text-align:center; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
</style>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div id="loader">
    <img src="LOGO.png" class="hd-logo">
    <div class="spinner"></div>
    <p style="margin-top:20px; font-weight:bold; color:#777; letter-spacing: 2px; font-size: 11px;">KERALA ESPORTS</p>
</div>

<div id="policyPopup" class="policy-overlay">
    <div class="policy-box">
        <div style="width:55px;height:55px;background:#ff4d4d;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-weight:900;">18+</div>
        <h3>Age Verification</h3>
        <p>This platform involves real money. Confirm you are 18+ to proceed to Kerala Esports.</p>
        <button style="background:var(--primary);color:white;border:none;padding:15px;border-radius:15px;width:100%;font-weight:bold;cursor:pointer;" onclick="acceptPolicy()">I AGREE & CONTINUE</button>
    </div>
</div>

<div class="container" id="loginContainer">
    <h1>Welcome to</h1>
    <h2>KERALA ESPORTS</h2>
    <div class="input-box"><input type="email" id="email" placeholder="Email Address"></div>
    <div class="input-box">
        <input type="password" id="password" placeholder="Password">
        <span class="show-pass" onclick="toggleLoginPass()">SHOW</span>
    </div>
    <div class="forgot" onclick="openReset()">Forgot Password?</div>
    <button class="btn-login" id="loginBtn" onclick="login()">LOGIN</button>
    <div id="error"></div>
    <div class="signup">Don't have an account? <span onclick="goSignup()">Sign Up</span></div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBrHcONT6y0he3fzrtRGqdQMZfIMpGxcNo",
    authDomain: "kl-esports.firebaseapp.com",
    databaseURL: "https://kl-esports-default-rtdb.firebaseio.com",
    projectId: "kl-esports",
    storageBucket: "kl-esports.appspot.com",
    messagingSenderId: "440301376580",
    appId: "1:440301376580:web:fb0b8ae0df3fe096bd1811"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

let userReady = false;
auth.onAuthStateChanged(user => { userReady = !!user; });

window.addEventListener("load", () => {
    setTimeout(() => {
        if (userReady) {
            window.location.href = "dashboard.html";
        } else {
            const ldr = document.getElementById("loader");
            ldr.style.opacity = "0";
            setTimeout(() => {
                ldr.style.display = "none";
                document.getElementById("loginContainer").style.display = "block";
                if(!localStorage.getItem("ageVerified")) {
                    document.getElementById("policyPopup").style.display = "flex";
                }
            }, 800);
        }
    }, 5000);
});

function acceptPolicy() {
    localStorage.setItem("ageVerified", "true");
    document.getElementById("policyPopup").style.display = "none";
}

function toggleLoginPass() {
    let p = document.getElementById("password");
    let s = document.querySelector(".show-pass");
    p.type = p.type === "password" ? "text" : "password";
    s.innerText = p.type === "password" ? "SHOW" : "HIDE";
}

function login() {
    let email = document.getElementById("email").value.trim();
    let pass = document.getElementById("password").value.trim();
    let error = document.getElementById("error");
    let btn = document.getElementById("loginBtn");

    if(!email || !pass) { error.style.color = "red"; error.innerText = "Please fill all fields"; return; }
    
    btn.innerText = "VERIFYING...";
    btn.disabled = true;

    auth.signInWithEmailAndPassword(email, pass)
    .then(() => { window.location.href="dashboard.html"; })
    .catch(err => {
        btn.innerText = "LOGIN"; 
        btn.disabled = false;
        error.style.color = "#ff4d4d"; 
        error.innerHTML = "Login Failed! <br> Please <span style='color:var(--primary); cursor:pointer;' onclick='goSignup()'>Sign Up</span> first if you are a new warrior.";
    });
}

function goSignup() { window.location.href="signup.html"; }
function openReset() { alert("Password reset link will be sent to your email."); }
</script>

</body>
</html>
